<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Dijo Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Nunito:wght@900&display=swap" rel="stylesheet">
  <link rel="icon" href="images/logo.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.23/dist/lenis.css">
</head>
<body data-barba="wrapper">

  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo-container">
          <img src="images/logo.png" alt="Dijo Studios Logo" class="logo-img">
          <span class="logo-text">Dijo<span>.</span>Studios</span>
        </a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      </nav>
    </div>
  </header>

  <div id="lightbox">
    <div class="lb-backdrop" onclick="closeLightbox()"></div>
    <span class="lb-counter" id="lb-counter">1 / 1</span>
    <button class="lb-close" onclick="closeLightbox()" aria-label="Close">&#x2715;</button>
    <button class="lb-prev"  onclick="shiftSlide(-1)"  aria-label="Previous">&#8592;</button>
    <button class="lb-next"  onclick="shiftSlide(1)"   aria-label="Next">&#8594;</button>
    <div class="lb-img-wrap">
      <img id="lb-img" src="" alt="Portfolio image"/>
    </div>
  </div>

  <main data-barba="container" data-barba-namespace="portfolio">
    <section class="reveal-up">
      <div class="container">
        <h2>PORTFOLIO</h2>
        
        <div class="upload-zone" id="drop-zone" style="display:none;">
          <p>Drop your photos here or click to browse</p>
          <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
        </div>
        <div style="text-align:center; margin-bottom:2rem; display:none;">
          <button class="clear-btn" id="clear-btn">Clear All</button>
        </div>

        <div class="grid" id="gallery">
          </div>
      </div>
    </section>

    <footer>
      <div class="container">
        <p>Dijo.Studios</p>
        <p>© 2025 Motshwane Letsoalo. All rights reserved.</p>
        <div style="margin-top:1rem;"><a href="#">Instagram</a> | <a href="#">LinkedIn</a></div>
      </div>
    </footer>
  </main>

  <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/split-type@0.3.4/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@barba/core"></script>
  <script src="script.js"></script>
</body>
</html>
