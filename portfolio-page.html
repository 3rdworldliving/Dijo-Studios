<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Dijo Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Nunito:wght@900&display=swap" rel="stylesheet">
  <link rel="icon" href="images/logo.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo-container">
          <img src="images/logo.png" alt="Dijo Studios Logo" class="logo-img">
          <span class="logo-text">Dijo<span>.</span>Studios</span>
        </a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
        <!-- FIX 5: added id="hamburger" so script.js can find and toggle it -->
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </div>
  </header>

  <section class="reveal-up">
    <div class="container">
      <h2>Portfolio</h2>

      <div class="upload-zone" id="drop-zone" style="display:none;">
        <p>Drop your photos here or click to browse</p>
        <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
      </div>
      <div style="text-align:center; margin-bottom:2rem; display:none;">
        <button class="clear-btn" id="clear-btn">Clear All</button>
      </div>

      <div class="grid" id="gallery">
        <!-- Portfolio images appear here -->
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>Dijo.Studios</p>
      <p>© 2025 Motshwane Letsoalo. All rights reserved.</p>
      <div style="margin-top:1rem;"><a href="#">Instagram</a> | <a href="#">LinkedIn</a></div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
